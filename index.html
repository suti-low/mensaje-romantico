
<!DOCTYPE html>
<html>
<head>
    <title>Mensaje Especial</title>
    <style>
        body {
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        h1 {
            font-size: 50px;
            color: white;
            text-align: center;
            animation: latido 1s infinite alternate;
        }
        @keyframes latido {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <h1>💘 Me estás conquistando 💘</h1>
</body>
</html>
